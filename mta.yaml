_schema-version: "3.2"
ID: workflow-mock-server
version: 1.0.0

modules:

  - name: workflow-ui
    type: html5
    path: frontend
    parameters:
      disk-quota: 256M
      memory: 256M

    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build
      supported-platforms: []

    requires:
      - name: html5-repo-runtime

  - name: workflow-backend
    type: java
    path: backend

    build-parameters:
      builder: maven
      build-result: target/*.jar

resources:

  - name: html5-repo-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime