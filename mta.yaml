_schema-version: "3.2"
ID: workflow-mock-server
version: 1.0.1

modules:
  # ==================== BACKEND ONLY ====================
  - name: workflow-backend
    type: java
    path: backend
    provides:
      - name: backend-api
        properties:
          url: ${default-url}
    build-parameters:
      builder: custom
      commands:
        - mvn clean package -DskipTests
      target-path: .
      build-result: target/*.jar

