specVersion: "3.0"
metadata:
  name: workflow-ui5-tester

type: application

builder:
  resources:
    excludes:
      - "/test/**"
      - "/localService/**"

server:
  customMiddleware:
    - name: ui5-middleware-simpleproxy
      afterMiddleware: compression
      mountPath: /api
      configuration:
        baseUri: "http://localhost:8082"